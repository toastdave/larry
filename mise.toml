min_version = "2025.1.0"

[tools]
bun = "1.3.10"

[tasks.install]
run = "bun install"
description = "Install workspace dependencies"

[tasks.dev]
depends = ["install"]
run = "bun run dev"
description = "Start the SvelteKit app locally"

[tasks."dev:docker"]
run = "docker compose up -d --build"
description = "Start the fully containerized app detached"

[tasks."docker:up"]
run = "docker compose up -d postgres mailpit"
description = "Start local infrastructure containers"

[tasks."docker:down"]
run = "docker compose down"
description = "Stop Docker services"

[tasks."tailscale:up"]
run = "sudo tailscale serve --bg --https=1501 http://127.0.0.1:1501"
description = "Expose the web app over Tailscale on port 1501"

[tasks."tailscale:status"]
run = "tailscale serve status"
description = "Show Tailscale Serve status"

[tasks."tailscale:down"]
run = "sudo tailscale serve --https=1501 off"
description = "Stop Tailscale Serve on port 1501"

[tasks.check]
depends = ["install"]
run = "bun run check"
description = "Run type checks across the workspace"

[tasks.lint]
depends = ["install"]
run = "bun run lint"
description = "Run Biome linting"

[tasks.format]
depends = ["install"]
run = "bun run format"
description = "Format the repository with Biome"

[tasks.test]
depends = ["install"]
run = "bun run test"
description = "Run Bun tests across the workspace"

[tasks.build]
depends = ["install"]
run = "bun run build"
description = "Build the SvelteKit app"

[tasks."ops:alerts"]
depends = ["install"]
run = "bun run ops:alerts"
description = "Run local ops alert threshold checks"

[tasks."ops:alerts:docker"]
run = "bun run ops:alerts:docker"
description = "Run ops alert threshold checks inside the web container"

[tasks."db:generate"]
depends = ["install"]
run = "bun run db:generate"
description = "Generate Drizzle SQL migrations"

[tasks."db:migrate"]
depends = ["install"]
run = "bun run db:migrate"
description = "Apply Drizzle migrations"

[tasks."db:push"]
depends = ["install"]
run = "bun run db:push"
description = "Push the schema directly to Postgres"

[tasks."db:studio"]
depends = ["install"]
run = "bun run db:studio"
description = "Open Drizzle Studio"

[tasks.seed]
depends = ["install"]
run = "bun run seed"
description = "Seed development data"
