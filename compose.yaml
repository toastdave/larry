services:
  postgres:
    image: postgres:17-alpine
    container_name: larry-postgres
    environment:
      POSTGRES_DB: larry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '1502:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d larry']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.27
    container_name: larry-mailpit
    ports:
      - '1503:1025'
      - '1504:8025'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: larry-web
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/larry
      SMTP_HOST: mailpit
      WATCHPACK_POLLING: 'true'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '1501:1501'
    volumes:
      - .:/app
      - /app/node_modules
    command: bun run dev -- --host 0.0.0.0 --port 1501

volumes:
  postgres-data:
