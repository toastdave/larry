x-app-base: &app-base
  build:
    context: .
    dockerfile: apps/web/Dockerfile
    target: development
  env_file:
    - .env
  environment:
    CHOKIDAR_USEPOLLING: 'true'
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/larry
    SMTP_HOST: mailpit
    WATCHPACK_POLLING: 'true'
  volumes:
    - .:/app
    - node_modules:/app/node_modules

services:
  postgres:
    image: postgres:17-alpine
    container_name: larry-postgres
    environment:
      POSTGRES_DB: larry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d larry']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.27
    container_name: larry-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'

  bootstrap:
    <<: *app-base
    container_name: larry-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -lc "bun run db:push && bun run seed"
    restart: 'no'

  web:
    <<: *app-base
    container_name: larry-web
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    ports:
      - '5173:5173'
    command: bun run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres-data:
  node_modules:
